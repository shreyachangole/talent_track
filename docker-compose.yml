version: '3.8'

services:
  # Redis Service
  redis:
    image: redis:latest
    container_name: talent_track_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - talent_track

  # MongoDB Service
  mongodb:
    image: mongo:latest
    container_name: talent_track_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: studentDB
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - talent_track

  # Application Service (optional - uncomment when needed)
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: talent_track_app
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #     MONGODB_URI: mongodb://mongodb:27017/studentDB
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     mongodb:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   networks:
  #     - talent_track

volumes:
  redis_data:
    driver: local
  mongodb_data:
    driver: local

networks:
  talent_track:
    driver: bridge
