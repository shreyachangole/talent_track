<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      height: 100vh;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }

    .dashboard {
      display: flex;
      width: 100%;
      height: 100%;
    }

    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      padding: 25px 15px;
      height: 100%;
      overflow-y: auto;
      box-shadow: 2px 0 15px rgba(0, 0, 0, 0.2);
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar ul li {
      margin-bottom: 8px;
    }

    .sidebar ul li a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      font-size: 15px;
      display: flex;
      align-items: center;
      padding: 12px 15px;
      border-radius: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .sidebar ul li a i {
      margin-right: 12px;
      width: 20px;
      text-align: center;
    }

    .sidebar ul li a:hover {
      background-color: rgba(255, 255, 255, 0.15);
      color: white;
      padding-left: 20px;
    }

    .sidebar ul li a.active {
      background-color: rgba(255, 255, 255, 0.25);
      color: white;
      font-weight: 600;
      border-left: 4px solid #ffc107;
      padding-left: 11px;
    }

    .main-content {
      flex-grow: 1;
      padding: 30px;
      background-color: #f5f7fa;
      overflow-y: auto;
    }

    .main-content h1 {
      margin-top: 0;
      margin-bottom: 25px;
      font-size: 32px;
      font-weight: 700;
      color: #1e3c72;
    }

    #content {
      margin-top: 10px;
      padding: 30px;
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #content h2 {
      color: #1e3c72;
      margin-bottom: 20px;
      font-size: 26px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    .form-group input {
      width: 60%;
      padding: 12px;
      border-radius: 8px;
      border: 1.5px solid #e0e0e0;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #2a5298;
      box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
    }

    .form-actions {
      margin-top: 25px;
    }

    .form-actions button {
      padding: 12px 30px;
      background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(42, 82, 152, 0.3);
    }

    .form-actions button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(42, 82, 152, 0.4);
    }

    .form-actions button:active {
      transform: translateY(0);
    }

    .button-container {
      margin: 2rem 0 2rem 0;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      border: 2px solid #2a5298;
      background-color: white;
      color: #2a5298;
      padding: 14px 28px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .btn:hover {
      background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
      color: #fff;
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(42, 82, 152, 0.3);
    }

    .btn:active {
      transform: translateY(-1px);
    }

    .btn i {
      font-size: 16px;
    }

    .btn a {
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn a:hover {
      color: inherit;
    }

    .announcement {
      margin-bottom: 20px;
      padding: 20px;
      background: linear-gradient(135deg, #f5f7fa 0%, #ffffff 100%);
      border-left: 4px solid #2a5298;
      border-radius: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .announcement:hover {
      transform: translateX(5px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    .announcement h3 {
      margin-bottom: 10px;
      color: #1e3c72;
      font-size: 18px;
      font-weight: 600;
    }

    .announcement p {
      font-size: 15px;
      line-height: 1.6;
      color: #555;
    }

    .announcement small {
      color: #999;
      font-size: 13px;
    }

    hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 20px 0;
    }

    @media (max-width: 768px) {
      .dashboard {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        padding: 15px;
        max-height: 200px;
        overflow-x: auto;
      }

      .sidebar ul {
        display: flex;
        gap: 10px;
      }

      .sidebar ul li {
        margin-bottom: 0;
        white-space: nowrap;
      }

      .main-content {
        padding: 20px;
      }

      .main-content h1 {
        font-size: 24px;
      }

      .form-group input {
        width: 100%;
      }

      .button-container {
        margin: 1rem 0;
      }

      .btn {
        padding: 12px 20px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="dashboard">
    <div class="sidebar">
      <h2><i class="fas fa-graduate"></i> Student Portal</h2>
      <ul>
        <li><a href="#" id="dashboard"><i class="fas fa-home"></i> Dashboard</a></li>
        <li><a href="#" id="aptitude"><i class="fas fa-brain"></i> Aptitude</a></li>
        <li><a href="#" id="tech"><i class="fas fa-code"></i> DSA Practice</a></li>
        <li><a href="#" id="Mockinterview"><i class="fas fa-video"></i> Mock Interview</a></li>
        <li><a href="#" id="resume"><i class="fas fa-file-alt"></i> Resume Builder</a></li>
        <li><a href="#" id="resumeats"><i class="fas fa-check-circle"></i> Resume Scanner</a></li>
        <li><a href="#" id="announcements"><i class="fas fa-bell"></i> Announcements</a></li>
        <li><a href="#" id="profile"><i class="fas fa-user-circle"></i> Profile</a></li>
        <li><a href="#" id="logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
      </ul>
    </div>

    <div class="main-content">
      <h1><i class="fas fa-wave-hand"></i> Welcome, <span id="fullName">Student</span></h1>
      <div id="content">
        <p>Select an option from the sidebar to view more details.</p>
      </div>
    </div>
  </div>

  <script>
    // Helper function to set active sidebar item
    function setActiveMenuItem(id) {
      document.querySelectorAll('.sidebar ul li a').forEach(link => {
        link.classList.remove('active');
      });
      if (id) {
        document.getElementById(id).classList.add('active');
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      const content = document.getElementById('content');

      // Fetch the full name from localStorage
      const fullName = localStorage.getItem('fullName');
      if (fullName) {
        document.getElementById('fullName').textContent = fullName;
      }

      // Dashboard Section
      document.getElementById('dashboard').addEventListener('click', function () {
        setActiveMenuItem('dashboard');
        content.innerHTML = `
          <h2><i class="fas fa-chart-line"></i> Dashboard Overview</h2>
          <p style="font-size: 16px; color: #555; line-height: 1.8;">Welcome to your personal dashboard. Here you can track your progress across all learning modules, view your recent activities, and access all available resources to enhance your skills.</p>
          <div class="button-container" style="margin-top: 30px;">
            <div style="padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 8px; color: white; flex: 1; min-width: 150px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
              <i class="fas fa-zap"></i> <strong>Quick Actions</strong>
              <p style="margin: 10px 0 0 0; font-size: 14px;">Access all modules from the sidebar</p>
            </div>
          </div>
        `;
      });

      // Aptitude Section with two inner buttons
      document.getElementById('aptitude').addEventListener('click', function (event) {
        event.preventDefault();
        setActiveMenuItem('aptitude');
        content.innerHTML = `
          <h2><i class="fas fa-brain"></i> Aptitude Options</h2>
          <div class="button-container">
            <button id="quizButton" class="btn"><i class="fas fa-pencil-alt"></i> Aptitude Quiz</button>
            <button id="dashboardButton" class="btn"><i class="fas fa-chart-pie"></i> Result Analysis & Visualization</button>
          </div>
        `;
        document.getElementById('quizButton').addEventListener('click', function () {
          window.location.href = 'http://localhost:8501';
        });
        document.getElementById('dashboardButton').addEventListener('click', function () {
          window.location.href = 'http://localhost:8502';
        });
      });

      // Mock Interview
      document.getElementById('Mockinterview').addEventListener('click', function (event) {
        event.preventDefault();
        setActiveMenuItem('Mockinterview');
        content.innerHTML = `
          <h2><i class="fas fa-video"></i> Mock Interview</h2>
          <p style="font-size: 15px; color: #666; margin-bottom: 20px;">Practice your interview skills with our interactive mock interview platform.</p>
          <div class="button-container">
            <button id="interButton" class="btn"><i class="fas fa-play-circle"></i> Start Interview</button>
          </div>
        `;
        document.getElementById('interButton').addEventListener('click', function () {
          window.location.href = 'http://localhost:8505';
        });
      });

      // Resume Builder Section
      document.getElementById('resume').addEventListener('click', function () {
        setActiveMenuItem('resume');
        content.innerHTML = `
          <h2><i class="fas fa-file-alt"></i> Resume Builder</h2>
          <p style="font-size: 15px; color: #666; margin-bottom: 20px;">Create Your Professional Resume With Our Advanced Resume Builder</p>
          <div class="button-container">
            <button type="button" class="btn">
              <i class="fas fa-plus-circle"></i> <a href="Form.html">Create Your Resume</a>
            </button>
          </div>
        `;
      });

      // Resume Scanner Section
      document.getElementById('resumeats').addEventListener('click', function () {
        setActiveMenuItem('resumeats');
        content.innerHTML = `
          <h2><i class="fas fa-check-circle"></i> ATS Resume Scanner</h2>
          <p style="font-size: 15px; color: #666; margin-bottom: 20px;">Check if your Resume is Job Ready with our ATS Compatibility Scanner</p>
          <div class="button-container">
            <button type="button" class="btn">
              <i class="fas fa-search"></i> <a href="http://localhost:8506">Start ATS Scan</a>
            </button>
          </div>
        `;
      });

      // Announcements Section with fetch request
      document.getElementById('announcements').addEventListener('click', function () {
        setActiveMenuItem('announcements');
        content.innerHTML = '<h2><i class="fas fa-bell"></i> Announcements</h2><p style="text-align: center; color: #999;">Loading announcements...</p>';
        fetch('http://localhost:3000/announcements')
          .then((response) => response.json())
          .then((data) => {
            if (data.length > 0) {
              let announcementsHtml = '';
              data.forEach((announcement) => {
                announcementsHtml += `
                  <div class="announcement">
                    <h3><i class="fas fa-bookmark"></i> ${announcement.title}</h3>
                    <p>${announcement.content}</p>
                    <p><small><i class="fas fa-calendar"></i> Published on: ${new Date(announcement.createdAt).toLocaleString()}</small></p>
                  </div>
                `;
              });
              content.innerHTML = `<h2><i class="fas fa-bell"></i> Announcements</h2>${announcementsHtml}`;
            } else {
              content.innerHTML = '<h2><i class="fas fa-bell"></i> Announcements</h2><p>No announcements available at this moment.</p>';
            }
          })
          .catch((error) => {
            content.innerHTML = '<h2><i class="fas fa-bell"></i> Announcements</h2><p style="color: #e74c3c;">Failed to load announcements. Please try again later.</p>';
          });
      });

      // Profile Section
      document.getElementById('profile').addEventListener('click', function () {
        setActiveMenuItem('profile');
        const storedFullName = localStorage.getItem('fullName') || '';
        const storedEmail = localStorage.getItem('email') || '';
        content.innerHTML = `
          <h2><i class="fas fa-user-circle"></i> My Profile</h2>
          <form id="profileForm">
            <div class="form-group">
              <label for="fullNameInput"><i class="fas fa-user"></i> Full Name</label>
              <input type="text" id="fullNameInput" value="${storedFullName}" />
            </div>
            <div class="form-group">
              <label for="emailInput"><i class="fas fa-envelope"></i> Email</label>
              <input type="email" id="emailInput" value="${storedEmail}" />
            </div>
            <div class="form-group">
              <label for="passwordInput"><i class="fas fa-lock"></i> Password</label>
              <input type="password" id="passwordInput" placeholder="Enter new password (leave blank to keep current)" />
            </div>
            <div class="form-actions">
              <button type="submit"><i class="fas fa-save"></i> Save Changes</button>
            </div>
          </form>
        `;
        document.getElementById('profileForm').addEventListener('submit', function (event) {
          event.preventDefault();
          const newFullName = document.getElementById('fullNameInput').value;
          const newEmail = document.getElementById('emailInput').value;
          const newPassword = document.getElementById('passwordInput').value;
          localStorage.setItem('fullName', newFullName);
          localStorage.setItem('email', newEmail);
          if (newPassword) {
            localStorage.setItem('password', newPassword);
          }
          document.getElementById('fullName').textContent = newFullName;
          content.innerHTML = '<div style="padding: 20px; background: #d4edda; border-left: 4px solid #28a745; border-radius: 8px; color: #155724;"><i class="fas fa-check-circle"></i> Your profile has been updated successfully!</div>';
        });
      });

      // Logout Section
      document.getElementById('logout').addEventListener('click', function () {
        if (confirm('Are you sure you want to logout?')) {
          localStorage.clear();
          window.location.href = 'student-login.html';
        }
      });

      // DSA Practice Section with two inner buttons
      document.getElementById('tech').addEventListener('click', function (event) {
        event.preventDefault();
        setActiveMenuItem('tech');
        content.innerHTML = `
          <h2><i class="fas fa-code"></i> DSA Practice Options</h2>
          <div class="button-container">
            <button id="dsaQuestionsButton" class="btn"><i class="fas fa-list-check"></i> DSA Questions</button>
            <button id="dsaAnalysisButton" class="btn"><i class="fas fa-chart-bar"></i> DSA Analysis</button>
          </div>
        `;
        document.getElementById('dsaQuestionsButton').addEventListener('click', function () {
          window.location.href = 'http://localhost:8503';
        });
        document.getElementById('dsaAnalysisButton').addEventListener('click', function () {
          window.location.href = 'http://localhost:8504';
        });
      });
    });
  </script>
</body>

</html>
