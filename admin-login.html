<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login/Register</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color:#091459;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color:#17BF5E ;
        }

        /* 🔑 Toggle text styling */
        .toggle-link {
            text-align: center;
            margin-top: 10px;
            pointer-events: none; /* disable parent clicks */
        }

        /* NON-clickable text color */
        .static-text {
            color: #555;          /* 👈 different color */
            pointer-events: none;
            cursor: default;
        }

        /* Clickable text color */
        .clickable-text {
            color: #0F8741;       /* 👈 rust orange */
            pointer-events: auto; /* enable click */
            cursor: pointer;
            text-decoration: underline;
        }

        .error-message {
            color: rgb(157, 18, 6);
            text-align: center;
            margin-top: 10px;
        }

        .register-fields {
            display: none;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #0F8741;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h1 id="form-title">Admin Login</h1>

    <form id="admin-form">
        <div class="register-fields">
            <input type="text" id="name" placeholder="Name">
            <input type="text" id="position" placeholder="Position">
            <input type="email" id="email" placeholder="Email">
            <input type="tel" id="phone" placeholder="Phone Number">
        </div>

        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <!-- Toggle text -->
    <div class="toggle-link" id="toggle-link">
        <span class="static-text">Don't have an account?</span>
        <span class="clickable-text"> Register here.</span>
    </div>

    <div class="error-message" id="error-message"></div>

    <div class="back-link">
        <a href="index.html">Back to Home</a>
    </div>
</div>

<script>
    let isLogin = true;

    const formTitle = document.getElementById('form-title');
    const toggleLink = document.getElementById('toggle-link');
    const registerFields = document.querySelector('.register-fields');
    const formButton = document.querySelector('button');

    toggleLink.addEventListener('click', () => {
        isLogin = !isLogin;

        formTitle.textContent = isLogin ? 'Admin Login' : 'Admin Register';

        toggleLink.innerHTML = isLogin
            ? '<span class="static-text">Don\'t have an account?</span><span class="clickable-text"> Register here.</span>'
            : '<span class="static-text">Already have an account?</span><span class="clickable-text"> Login here.</span>';

        registerFields.style.display = isLogin ? 'none' : 'block';
        formButton.textContent = isLogin ? 'Login' : 'Register';
    });

    document.getElementById('admin-form').addEventListener('submit', async function (e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        let payload = { username, password };

        if (!isLogin) {
            payload = {
                name: document.getElementById('name').value,
                position: document.getElementById('position').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                username,
                password
            };
        }

        const url = isLogin
            ? 'http://localhost:3000/admin/login'
            : 'http://localhost:3000/admin/register';

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });

        const data = await response.json();
        const errorMessage = document.getElementById('error-message');

        if (response.ok) {
            alert(data.message);
            if (isLogin) window.location.href = './addashboard.html';
        } else {
            errorMessage.textContent = data.message;
        }
    });
</script>

</body>
</html>
